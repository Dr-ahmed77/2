<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  
  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  
  <!-- Medical cross -->
  <rect x="216" y="120" width="80" height="272" rx="16" fill="url(#cross)" filter="url(#glow)"/>
  <rect x="120" y="216" width="272" height="80" rx="16" fill="url(#cross)" filter="url(#glow)"/>
  
  <!-- M letter overlay subtle -->
  <text x="256" y="290" 
        font-family="Arial Black, Arial" 
        font-weight="900" 
        font-size="130" 
        fill="white" 
        fill-opacity="0.15"
        text-anchor="middle"
        letter-spacing="-4">M</text>
</svg>